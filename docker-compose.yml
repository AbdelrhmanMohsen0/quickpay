services:
  # KAFKA BROKER
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://0.0.0.0:9094,CONTROLLER://kafka:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    ports:
      - "9094:9094"

  # AUTH SERVICE POSTGRES DATABASE
  auth-db:
    image: postgres:latest
    container_name: auth-db
    environment:
      POSTGRES_DB: ${AUTH_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - auth_data:/var/lib/postgresql

  # AUTH SERVICE
  auth-service:
    build: ./auth-service
    container_name: auth-service
    depends_on:
      - auth-db
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/${AUTH_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SERVER_PORT: 8080

  # USER SERVICE POSTGRES DATABASE
  user-db:
    image: postgres:latest
    container_name: user-db
    environment:
      POSTGRES_DB: ${USER_DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - user_data:/var/lib/postgresql

  # USER SERVICE
  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - user-db
      - kafka
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://user-db:5432/${USER_DB_NAME}
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8080

  # --- TRANSACTION MICROSERVICE ---
  transaction-db:
    image: postgres:latest
    container_name: transaction-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: transaction_db
    ports:
      - "5434:5432"
    volumes:
      - transaction_data:/var/lib/postgresql

  transaction-service:
      build: ./transaction-service
      container_name: transaction-service
      depends_on:
        - transaction-db
        - kafka
      environment:
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_DATASOURCE_URL: jdbc:postgresql://transaction-db:5432/transaction_db
        SPRING_DATASOURCE_USERNAME: ${DB_USER}
        SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
        SERVER_PORT: 8080
  # --- WALLET MICROSERVICE ---
  wallet-db:
    image: postgres:latest
    container_name: wallet-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: wallet_db
    ports:
      - "5436:5432"
    volumes:
      - wallet_data:/var/lib/postgresql

  wallet-service:
      build: ./wallet-service
      container_name: wallet-service
      depends_on:
        - wallet-db
        - kafka
      environment:
        SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
        SPRING_DATASOURCE_URL: jdbc:postgresql://wallet-db:5432/wallet_db
        SPRING_DATASOURCE_USERNAME: ${DB_USER}
        SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
        SERVER_PORT: 8080

  # --- NOTIFICATION MICROSERVICE ---
  notification-db:
    image: postgres:latest
    container_name: notification-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: notification_db
    ports:
      - "5435:5432"
    volumes:
      - notification_data:/var/lib/postgresql

  notification-service:
    build: ./notification-service
    container_name: notification-service
    depends_on:
      - notification-db
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://notification-db:5432/notification_db
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SERVER_PORT: 8084
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - auth-service
      - user-service
      - transaction-service
      - wallet-service
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET}
      AUTH_SERVICE_URI: http://auth-service:8080
      USER_SERVICE_URI: http://user-service:8080
      TRANSACTION_SERVICE_URI: http://transaction-service:8080
      WALLET_SERVICE_URI: http://wallet-service:8080
volumes:
  auth_data:
  user_data:
  transaction_data:
  wallet_data:
  notification_data:
