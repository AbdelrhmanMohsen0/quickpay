spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URI}
              predicates:
                - Path=/api/v1/auth/**
              filters:
                - StripPrefix=3

            - id: user-service
              uri: ${USER_SERVICE_URI}
              predicates:
                - Path=/api/v1/users/**
              filters:
                - StripPrefix=3

            - id: transaction-service
              uri: ${TRANSACTION_SERVICE_URI}
              predicates:
                - Path=/api/v1/transaction/**
              filters:
                - StripPrefix=3

            - id: wallet-service
              uri: ${WALLET_SERVICE_URI}
              predicates:
                - Path=/api/v1/wallet/**
              filters:
                - StripPrefix=3
